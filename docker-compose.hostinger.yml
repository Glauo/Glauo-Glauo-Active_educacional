services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        GIT_SHA: ${GIT_SHA:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      GIT_SHA: ${GIT_SHA:-local}
      ACTIVE_DATA_DIR: /app/data
      ACTIVE_DATABASE_URL: "postgres://postgres:yzaf9IIANpm3C51phXHLGlnn@postgres_active_local:5432/ativo_educacional?sslmode=disable"
      DATABASE_URL: "postgres://postgres:yzaf9IIANpm3C51phXHLGlnn@postgres_active_local:5432/ativo_educacional?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET:-ativo-educacional-jwt-2026-pyioBAUq7fhAx26IL7hVd1HAnw6cLb}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://ativoeducacional.tech}
      APP_URL: ${APP_URL:-https://ativoeducacional.tech}
      ACTIVE_PORTAL_URL: ${ACTIVE_PORTAL_URL:-https://ativoeducacional.tech}
      ALUNO_PORTAL_URL: ${ALUNO_PORTAL_URL:-https://ativoeducacional.tech}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ACTIVE_GROQ_API_KEY: ${ACTIVE_GROQ_API_KEY:-}
      ACTIVE_OPENAI_API_KEY: ${ACTIVE_OPENAI_API_KEY:-}
      ACTIVE_AI_BASE_URL: ${ACTIVE_AI_BASE_URL:-}
      ACTIVE_CHATBOT_MODEL: ${ACTIVE_CHATBOT_MODEL:-llama-3.3-70b-versatile}
      ACTIVE_WIZ_MODEL: ${ACTIVE_WIZ_MODEL:-llama-3.3-70b-versatile}
      ACTIVE_CHALLENGE_MODEL: ${ACTIVE_CHALLENGE_MODEL:-llama-3.3-70b-versatile}
      ACTIVE_WHATSAPP_PROVIDER: ${ACTIVE_WHATSAPP_PROVIDER:-wapi}
      WAPI_BASE_URL: ${WAPI_BASE_URL:-}
      WAPI_TOKEN: ${WAPI_TOKEN:-}
      WAPI_INSTANCE_ID: ${WAPI_INSTANCE_ID:-}
      ACTIVE_WAPI_URL: ${ACTIVE_WAPI_URL:-}
      ACTIVE_WAPI_TOKEN: ${ACTIVE_WAPI_TOKEN:-}
      ACTIVE_WAPI_INSTANCE: ${ACTIVE_WAPI_INSTANCE:-}
      ACTIVE_SMTP_HOST: ${ACTIVE_SMTP_HOST:-}
      ACTIVE_SMTP_PORT: ${ACTIVE_SMTP_PORT:-587}
      ACTIVE_SMTP_USER: ${ACTIVE_SMTP_USER:-}
      ACTIVE_SMTP_PASS: ${ACTIVE_SMTP_PASS:-}
      ACTIVE_EMAIL_FROM: ${ACTIVE_EMAIL_FROM:-}
      ACTIVE_EMAIL_FROM_NAME: ${ACTIVE_EMAIL_FROM_NAME:-Active Educacional}
      ACTIVE_SMTP_TLS: ${ACTIVE_SMTP_TLS:-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Active Educacional}
      SMTP_TLS: ${SMTP_TLS:-1}
      ACTIVE_BOLETO_PROVIDER: mercado_pago
      ACTIVE_BOLETO_API_URL: https://api.mercadopago.com
      ACTIVE_MERCADO_PAGO_ACCESS_TOKEN: ${ACTIVE_MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      ACTIVE_MERCADO_PAGO_WEBHOOK_SECRET: ${ACTIVE_MERCADO_PAGO_WEBHOOK_SECRET:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      ACTIVE_MERCADO_PAGO_WEBHOOK_URL: ${ACTIVE_MERCADO_PAGO_WEBHOOK_URL:-https://ativoeducacional.tech/api/financeiro/mercado-pago/webhook}
      CRON_SECRET: ${CRON_SECRET:-ae-cron-boletos-2026}
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    networks:
      default: {}
      easypanel:
        aliases:
          - ativo-educacional_github_app

  wizbot:
    build:
      context: ./deploy/wizbot
      args:
        GIT_SHA: ${GIT_SHA:-local}
    restart: unless-stopped
    environment:
      ACTIVE_DATABASE_URL: "postgres://postgres:yzaf9IIANpm3C51phXHLGlnn@postgres_active_local:5432/ativo_educacional?sslmode=disable"
      DATABASE_URL: "postgres://postgres:yzaf9IIANpm3C51phXHLGlnn@postgres_active_local:5432/ativo_educacional?sslmode=disable"
      ACTIVE_WIZ_WEBHOOK_TOKEN: ${ACTIVE_WIZ_WEBHOOK_TOKEN:-2523wiz}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WAPI_BASE_URL: ${WAPI_BASE_URL:-}
      WAPI_TOKEN: ${WAPI_TOKEN:-}
      WAPI_INSTANCE_ID: ${WAPI_INSTANCE_ID:-}
      WIZBOT_PAUSED: "1"
      CRON_SECRET: ${CRON_SECRET:-ae-cron-boletos-2026}
      FRONTEND_INTERNAL_URL: "http://app:3000"
    expose:
      - "8787"
    networks:
      default: {}
      easypanel:
        aliases:
          - ativo-educacional_github_wizbot

networks:
  easypanel:
    external: true
