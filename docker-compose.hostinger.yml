services:

  # ── Streamlit / Wiz backend (interno, não exposto ao público) ──────────────
  app:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-local}
    restart: unless-stopped
    environment:
      ACTIVE_DATA_DIR: /app/data
      ACTIVE_DATABASE_URL: ${ACTIVE_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ACTIVE_GROQ_API_KEY: ${ACTIVE_GROQ_API_KEY}
      ACTIVE_CHATBOT_MODEL: ${ACTIVE_CHATBOT_MODEL}
      ACTIVE_WIZ_MODEL: ${ACTIVE_WIZ_MODEL}
      ACTIVE_CHALLENGE_MODEL: ${ACTIVE_CHALLENGE_MODEL}
      ACTIVE_PORTAL_URL: ${ACTIVE_PORTAL_URL}
      ALUNO_PORTAL_URL: ${ALUNO_PORTAL_URL}
      ACTIVE_WHATSAPP_PROVIDER: ${ACTIVE_WHATSAPP_PROVIDER}
      WAPI_BASE_URL: ${WAPI_BASE_URL}
      WAPI_TOKEN: ${WAPI_TOKEN}
      WAPI_INSTANCE_ID: ${WAPI_INSTANCE_ID}
    volumes:
      - ./data:/app/data
    expose:
      - "8501"

  # ── Next.js frontend (interface pública) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        GIT_SHA: ${GIT_SHA:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ACTIVE_DATABASE_URL: ${ACTIVE_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - app

  # ── Wiz webhook / automações WhatsApp ────────────────────────────────────────
  wizbot:
    build:
      context: ./deploy/wizbot
      args:
        GIT_SHA: ${GIT_SHA:-local}
    restart: unless-stopped
    environment:
      ACTIVE_DATABASE_URL: ${ACTIVE_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      ACTIVE_WIZ_WEBHOOK_TOKEN: ${ACTIVE_WIZ_WEBHOOK_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      WAPI_BASE_URL: ${WAPI_BASE_URL}
      WAPI_TOKEN: ${WAPI_TOKEN}
      WAPI_INSTANCE_ID: ${WAPI_INSTANCE_ID}
    expose:
      - "8787"

  # ── Caddy — HTTPS automático + reverse proxy ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/hostinger/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - wizbot

volumes:
  caddy_data:
  caddy_config:
