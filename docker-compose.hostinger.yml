services:
  app:
    build: .
    restart: unless-stopped
    environment:
      ACTIVE_DATA_DIR: /app/data
      ACTIVE_DATABASE_URL: ${ACTIVE_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ACTIVE_GROQ_API_KEY: ${ACTIVE_GROQ_API_KEY}
      ACTIVE_WIZ_API_KEY: ${ACTIVE_WIZ_API_KEY}
      ACTIVE_CHATBOT_MODEL: ${ACTIVE_CHATBOT_MODEL}
      ACTIVE_WIZ_MODEL: ${ACTIVE_WIZ_MODEL}
      ACTIVE_CHALLENGE_MODEL: ${ACTIVE_CHALLENGE_MODEL}
      ACTIVE_PORTAL_URL: ${ACTIVE_PORTAL_URL}
      ALUNO_PORTAL_URL: ${ALUNO_PORTAL_URL}
      ACTIVE_WHATSAPP_PROVIDER: ${ACTIVE_WHATSAPP_PROVIDER}
      WAPI_BASE_URL: ${WAPI_BASE_URL}
      WAPI_TOKEN: ${WAPI_TOKEN}
      WAPI_INSTANCE_ID: ${WAPI_INSTANCE_ID}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
    volumes:
      - ./data:/app/data
