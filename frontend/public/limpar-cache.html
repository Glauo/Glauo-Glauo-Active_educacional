<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Limpar cache | Ativo Educacional</title>
    <style>
      body {
        align-items: center;
        background: #f8fafc;
        color: #020617;
        display: flex;
        font-family: Arial, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      section {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        max-width: 420px;
        padding: 32px;
        text-align: center;
        width: 100%;
      }

      p:first-child {
        color: #2563eb;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 26px;
        margin: 0;
      }

      #status {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
        margin: 16px 0 0;
      }
    </style>
  </head>
  <body>
    <section>
      <p>Ativo Educacional</p>
      <h1>Reparando acesso</h1>
      <p id="status">Limpando cache do sistema...</p>
    </section>
    <script>
      async function clearActiveCache() {
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith("ativo-edu-")).map((key) => caches.delete(key)));
        }

        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      }

      clearActiveCache()
        .then(() => {
          document.getElementById("status").textContent = "Cache limpo. Redirecionando...";
          window.setTimeout(() => window.location.replace("/login"), 900);
        })
        .catch(() => {
          document.getElementById("status").textContent = "Use Ctrl + F5 e tente novamente.";
        });
    </script>
  </body>
</html>
